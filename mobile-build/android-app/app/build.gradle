plugins { id "com.android.application" }

android {
    namespace "com.openclaw.fruitauto"
    compileSdk 35
    defaultConfig { applicationId "com.openclaw.fruitauto"; minSdk 23; targetSdk 35; versionCode 31103; versionName "3.11.3" }
    signingConfigs {
        release {
            storeFile signingConfigs.debug.storeFile
            storePassword signingConfigs.debug.storePassword
            keyAlias signingConfigs.debug.keyAlias
            keyPassword signingConfigs.debug.keyPassword
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
